# Render Blueprint — deploys the Socket.IO backend as a persistent web service.
# Create one in the Render dashboard: New → Blueprint → pick this repo.
# Render injects PORT automatically; the server binds 0.0.0.0 by default.
services:
  - type: web
    name: zombie-run-backend
    runtime: node
    rootDir: backend
    plan: free
    # --include=dev forces devDependencies (TypeScript) to install even though
    # Render sets NODE_ENV=production, so `tsc` is available for the build.
    buildCommand: npm install --include=dev && npm run build
    startCommand: npm start
    healthCheckPath: /api/status
    autoDeploy: true
    envVars:
      # Optional: lock CORS to your frontend origin (e.g. https://your-app.vercel.app).
      # Leave unset to allow any origin (fine for a public game with no auth).
      - key: FRONTEND_ORIGIN
        sync: false
